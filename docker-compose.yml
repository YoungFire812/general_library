services:
  db:
    image: postgres:15
    networks:
      - app_network
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio
    networks:
      - app_network
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    env_file:
      - .env
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  backend:
    networks:
      - app_network
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: backend
    env_file:
      - .env
    depends_on:
      - db
      - minio
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src

  frontend:
    networks:
      - app_network
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    ports:
      - "8080:8080"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

networks:
  app_network:
    driver: bridge